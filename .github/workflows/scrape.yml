name: Scrape Hanoi results

on:
  schedule:
    # Hanoi draws ~19:00-19:30 Thai (UTC+7); results settle by ~20:00 Thai
    # (13:00 UTC). Datacenter IPs get soft-blocked intermittently, so fire
    # several times across the evening — each run is a fresh runner IP, so it's
    # very unlikely they all get blocked. The first to succeed commits; the rest
    # find no change and no-op.
    - cron: "0 13 * * *"    # 20:00 Thai
    - cron: "45 13 * * *"   # 20:45 Thai
    - cron: "30 14 * * *"   # 21:30 Thai
    - cron: "30 15 * * *"   # 22:30 Thai
    - cron: "0 17 * * *"    # 00:00 Thai (late safety net)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scrape
        run: python scrape.py

      - name: Commit if changed
        run: |
          git config user.name "hanoi-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/hanoi.json)" ]; then
            git add data/hanoi.json
            git commit -m "data: hanoi results $(date -u +%Y-%m-%dT%H:%MZ)"
            # Rebase on any commits that landed while we ran, so push is fast-forward
            git pull --rebase --autostash origin main
            git push
          else
            echo "No change."
          fi
